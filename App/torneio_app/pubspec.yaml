name: torneio_app
description: "App de gerenciamento de torneios — perfis Fiscal e Telespectador."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.0

  # State management
  provider: ^6.1.2

  # Persistência local
  shared_preferences: ^2.3.2
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4

  # Conectividade
  connectivity_plus: ^6.1.1

  # Deep links
  app_links: ^6.3.2

  # Abrir URLs, apps externos (WhatsApp, Instagram, e-mail, navegador)
  url_launcher: ^6.3.1

  # Imagens em cache
  cached_network_image: ^3.4.1

  # Câmera / imagem
  image_picker: ^1.1.2

  # Utilitários
  intl: ^0.19.0
  uuid: ^4.5.1
  printing: ^5.13.4

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
